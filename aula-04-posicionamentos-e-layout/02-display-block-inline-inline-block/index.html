<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Exemplos de Display</h1>

    <h2>Display: block</h2>
    <div class="block">Bloco 1</div>
    <div class="block">Bloco 2</div>
    <!-- block: O block é o display padrão de elementos como div, main, footer, haeader, etc. Ele considera um elemento por linha, e cada elemento ocupa toda uma linha. -->


    <h2>Display: inline</h2>
    <span class="inline">Texto inline 1</span>
    <span class="inline">Texto inline 2</span>
    <!-- inline: O inline é o display padrão de todos os elementos de texto, e ele coloca um elemento ao lado do outro, porém, ele não pode ser seu widght e seu height personalizado, isso é fixo. -->

    <h2>Siaplay: inline-block</h2>
    <div class="inline-block">Elemento visual 1</div>
    <div class="inline-block">Elemento visual 2</div>
    <!-- inline-block: ele alinha elementos horizontalmente (na mesma linha) que pode ter seu tamanho, tanto de altura quanto de largura personalizados. -->
</body>
</html>
